<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Quick Cart Slide-out Popup</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen relative overflow-hidden flex justify-end">
<!-- Overlay (simulated for popup context) -->
<div class="fixed inset-0 bg-slate-900/50 dark:bg-slate-900/80 z-40 transition-opacity"></div>
<!-- Slide-out Cart -->
<div class="relative z-50 flex h-screen w-full max-w-[400px] flex-col bg-white dark:bg-slate-800 shadow-2xl overflow-y-auto">
<!-- Header -->
<div class="flex items-center justify-between px-6 py-5 border-b border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 sticky top-0 z-10">
<h2 class="text-xl font-bold leading-tight tracking-[-0.015em] text-slate-900 dark:text-slate-100">Your Cart</h2>
<button class="flex items-center justify-center p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-500 dark:text-slate-400 transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Cart Items -->
<div class="flex-1 px-6 py-4 flex flex-col gap-6">
<!-- Item 1 -->
<div class="flex gap-4">
<div class="bg-center bg-no-repeat aspect-square bg-cover rounded-lg w-[80px] shrink-0 border border-slate-200 dark:border-slate-700" data-alt="Matte white ceramic mug" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuA8-GTHmVNd0Mk1tLZjfCxtBX-PEQIbr2HcFrJnozXAEhTwW5M9xOsPoQzLSRd0z4NtiApXKp5XQp-ehrpOItRFmOHV2V5RVCZYqi2TrjSoi5wIFrLM51MbmDeMRdhHpxiKPnvOZqNTz3oc-j5mdw3fGXhQJ8BeXWx80aBwcpiyTKNmuzOIDB8qES_l1x_WXPWYDGF4iNL6C_X53YIjvgGgCF6xe8ftgxrS9GL0I1jLDEXC6zodjqgZZVhYflCZeMxbLUoLXm496gA");'></div>
<div class="flex flex-1 flex-col justify-between py-1">
<div>
<div class="flex justify-between items-start">
<h3 class="text-base font-medium leading-tight text-slate-900 dark:text-slate-100 pr-4">Minimalist Ceramic Mug</h3>
<button class="text-slate-400 hover:text-red-500 dark:text-slate-500 dark:hover:text-red-400 transition-colors">
<span class="material-symbols-outlined text-[20px]">delete</span>
</button>
</div>
<p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Color: Matte White</p>
</div>
<div class="flex justify-between items-end mt-3">
<div class="flex items-center gap-2 border border-slate-200 dark:border-slate-600 rounded-lg bg-slate-50 dark:bg-slate-700 p-1">
<button class="flex h-6 w-6 items-center justify-center rounded bg-transparent hover:bg-slate-200 dark:hover:bg-slate-600 text-slate-600 dark:text-slate-300 transition-colors">-</button>
<input class="w-6 p-0 text-center bg-transparent focus:outline-0 focus:ring-0 focus:border-none border-none text-sm font-medium text-slate-900 dark:text-slate-100 [appearance:textfield] [&amp;::-webkit-inner-spin-button]:appearance-none [&amp;::-webkit-outer-spin-button]:appearance-none" type="number" value="2"/>
<button class="flex h-6 w-6 items-center justify-center rounded bg-transparent hover:bg-slate-200 dark:hover:bg-slate-600 text-slate-600 dark:text-slate-300 transition-colors">+</button>
</div>
<p class="text-slate-900 dark:text-slate-100 font-semibold">$48.00</p>
</div>
</div>
</div>
<!-- Item 2 -->
<div class="flex gap-4">
<div class="bg-center bg-no-repeat aspect-square bg-cover rounded-lg w-[80px] shrink-0 border border-slate-200 dark:border-slate-700" data-alt="Organic cotton throw blanket" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuDcQjzWtCJ2QaB4lsvdREkD1xxM3yHnrp3gLJWXilYqG529ldyL9QR27PRKkWxfYVGDLZsUtP6wQWiZzkRYFsS3ETJG96wnpL9ai-dbta9KH7hKy77_MJX2KvCgqhiZe-SBcJB2NHF37oAlUeDjk_SW8WiyOFdwTaIV2Is45f11oJo0Qj5nuJ9ejIZDuGD37tGrMjn7B0ZNPZfZeMLFGVXBsROztl4xAoThVUxSNZjHT9DU30vt48sOLAyl70-ofBBd2O1K8NhWFSU");'></div>
<div class="flex flex-1 flex-col justify-between py-1">
<div>
<div class="flex justify-between items-start">
<h3 class="text-base font-medium leading-tight text-slate-900 dark:text-slate-100 pr-4">Organic Cotton Throw</h3>
<button class="text-slate-400 hover:text-red-500 dark:text-slate-500 dark:hover:text-red-400 transition-colors">
<span class="material-symbols-outlined text-[20px]">delete</span>
</button>
</div>
<p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Size: Standard</p>
</div>
<div class="flex justify-between items-end mt-3">
<div class="flex items-center gap-2 border border-slate-200 dark:border-slate-600 rounded-lg bg-slate-50 dark:bg-slate-700 p-1">
<button class="flex h-6 w-6 items-center justify-center rounded bg-transparent hover:bg-slate-200 dark:hover:bg-slate-600 text-slate-600 dark:text-slate-300 transition-colors">-</button>
<input class="w-6 p-0 text-center bg-transparent focus:outline-0 focus:ring-0 focus:border-none border-none text-sm font-medium text-slate-900 dark:text-slate-100 [appearance:textfield] [&amp;::-webkit-inner-spin-button]:appearance-none [&amp;::-webkit-outer-spin-button]:appearance-none" type="number" value="1"/>
<button class="flex h-6 w-6 items-center justify-center rounded bg-transparent hover:bg-slate-200 dark:hover:bg-slate-600 text-slate-600 dark:text-slate-300 transition-colors">+</button>
</div>
<p class="text-slate-900 dark:text-slate-100 font-semibold">$45.00</p>
</div>
</div>
</div>
</div>
<!-- Footer / Summary -->
<div class="border-t border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/80 p-6 sticky bottom-0 z-10">
<div class="space-y-3 mb-6">
<div class="flex justify-between items-center text-slate-600 dark:text-slate-400">
<p class="text-sm">Subtotal</p>
<p class="text-sm font-medium text-slate-900 dark:text-slate-100">$93.00</p>
</div>
<div class="flex justify-between items-center text-slate-600 dark:text-slate-400">
<p class="text-sm">Shipping</p>
<p class="text-sm text-slate-500">Calculated at checkout</p>
</div>
<div class="flex justify-between items-center pt-3 border-t border-slate-200 dark:border-slate-700">
<p class="text-base font-semibold text-slate-900 dark:text-slate-100">Total</p>
<p class="text-xl font-bold text-slate-900 dark:text-slate-100">$93.00</p>
</div>
</div>
<div class="flex flex-col gap-3">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-semibold py-3 px-4 rounded-lg flex items-center justify-center gap-2 transition-colors">
                    Express Checkout
                    <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
<button class="w-full bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-600 hover:bg-slate-50 dark:hover:bg-slate-700 text-slate-900 dark:text-slate-100 font-medium py-3 px-4 rounded-lg transition-colors">
                    View Full Cart
                </button>
</div>
<p class="text-center text-sm text-slate-500 dark:text-slate-400 mt-4 flex items-center justify-center gap-1.5">
<span class="material-symbols-outlined text-[16px]">bolt</span>
                Checkout instantly. No account required.
            </p>
</div>
</div>
</body></html>
