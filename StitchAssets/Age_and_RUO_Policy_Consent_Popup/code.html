<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Age and Policy Consent</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#0EA5E9",
                        "background-light": "#F8FAFC",
                        "background-dark": "#0F172A",
                        "surface-light": "#FFFFFF",
                        "surface-dark": "#1E293B",
                        "text-light": "#334155",
                        "text-dark": "#CBD5E1",
                        "text-muted-light": "#64748B",
                        "text-muted-dark": "#94A3B8",
                    },
                    fontFamily: {
                        display: ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "0.5rem",
                    },
                },
            },
        };
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex items-center justify-center p-4">
<div class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-40 transition-opacity"></div>
<div class="bg-surface-light dark:bg-surface-dark w-full max-w-lg rounded-xl shadow-2xl z-50 overflow-hidden border border-slate-200 dark:border-slate-700 relative">
<div class="p-8 flex flex-col items-center text-center space-y-8">
<div class="flex flex-col items-center space-y-4">
<div class="flex items-center space-x-3 text-primary">
<svg class="w-12 h-12 text-[#1e40af] dark:text-[#3b82f6]" fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"></path>
</svg>
<div class="text-left leading-tight">
<h1 class="text-3xl font-bold tracking-wider text-[#1e40af] dark:text-[#3b82f6]">BIOLONGEVITY</h1>
<h2 class="text-2xl font-semibold tracking-wide text-primary">LABS</h2>
</div>
</div>
</div>
<div class="space-y-6 w-full">
<h3 class="text-xl font-medium text-text-light dark:text-white">
                    Are you over 21 years of age?
                </h3>
<div class="flex justify-center space-x-4">
<button class="px-8 py-2.5 bg-primary hover:bg-sky-600 text-white font-medium rounded transition-colors focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 dark:focus:ring-offset-background-dark">
                        No
                    </button>
<button class="px-8 py-2.5 bg-primary hover:bg-sky-600 text-white font-medium rounded transition-colors focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 dark:focus:ring-offset-background-dark">
                        Yes
                    </button>
</div>
</div>
<div class="w-full space-y-4 pt-4 text-sm text-text-light dark:text-text-dark text-left">
<label class="flex items-start space-x-3 cursor-pointer group">
<div class="flex-shrink-0 mt-1">
<input class="form-checkbox h-4 w-4 text-primary border-slate-300 dark:border-slate-600 rounded bg-white dark:bg-slate-800 focus:ring-primary transition-colors" type="checkbox"/>
</div>
<span class="leading-relaxed">
                        I agree and understand that certain products on this site are intended for research use only, as defined by the FDA. I also agree to the 
                        <a class="text-orange-500 hover:text-orange-600 dark:text-orange-400 dark:hover:text-orange-300 transition-colors" href="#">Research Use Only Policy</a> of this site.
                    </span>
</label>
<div class="flex justify-center pt-2">
<label class="flex items-center space-x-2 cursor-pointer group">
<input class="form-checkbox h-4 w-4 text-primary border-slate-300 dark:border-slate-600 rounded bg-white dark:bg-slate-800 focus:ring-primary transition-colors" type="checkbox"/>
<span>Remember me</span>
</label>
</div>
</div>
</div>
</div>

</body></html>
