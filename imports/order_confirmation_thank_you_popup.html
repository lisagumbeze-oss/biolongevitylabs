<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Order Confirmation Thank You Popup</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display flex items-center justify-center min-h-screen p-4 text-slate-900 dark:text-slate-100">
<div class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-40 flex items-center justify-center">
<div class="bg-white dark:bg-slate-800 rounded-xl shadow-2xl w-full max-w-md overflow-hidden z-50 animate-in fade-in zoom-in duration-300">
<div class="flex justify-end p-4 pb-0">
<button class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 transition-colors">
<span class="material-symbols-outlined text-2xl">close</span>
</button>
</div>
<div class="flex flex-col items-center px-8 pb-10 pt-4 text-center">
<div class="mb-6 flex items-center justify-center w-20 h-20 rounded-full bg-green-100 dark:bg-green-900/30 text-green-600 dark:text-green-400">
<span class="material-symbols-outlined text-4xl">check_circle</span>
</div>
<h2 class="text-2xl font-bold mb-2">Order Successfully Placed!</h2>
<p class="text-sm text-slate-500 dark:text-slate-400 mb-6 font-medium">Order ID: <span class="text-slate-900 dark:text-slate-100">#987654321</span></p>
<p class="text-base text-slate-600 dark:text-slate-300 mb-8 max-w-sm">
                    Thank you for your purchase! A confirmation email with manual payment instructions has been sent to your inbox.
                </p>
<div class="flex flex-col gap-4 w-full">
<button class="w-full h-12 flex items-center justify-center rounded-lg bg-primary hover:bg-primary/90 text-white font-bold transition-colors">
                        Continue Shopping
                    </button>
<a class="w-full h-12 flex items-center justify-center rounded-lg bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 text-slate-700 dark:text-slate-200 font-medium transition-colors" href="/contact">
                        Contact Support to Make Payment
                    </a>
</div>
</div>
<div class="h-2 w-full bg-primary"></div>
</div>
</div>
</body></html>
